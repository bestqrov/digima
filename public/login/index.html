<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - ArwaPark SaaS</title>
    <meta name="description" content="Sign in to your ArwaPark dashboard">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚚</text></svg>">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 20% 50%, rgba(120,119,198,.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(120,219,255,.3) 0%, transparent 50%),
                linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem;
            position: relative;
        }

        /* Floating blobs */
        .blobs {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 6s ease-in-out infinite;
        }
        .blob-1 { top: 5rem; left: 5rem; width: 18rem; height: 18rem; background: linear-gradient(135deg, rgba(167,139,250,.2), rgba(236,72,153,.2)); }
        .blob-2 { top: 10rem; right: 5rem; width: 24rem; height: 24rem; background: linear-gradient(135deg, rgba(96,165,250,.2), rgba(34,211,238,.2)); animation-delay: -2s; }
        .blob-3 { bottom: 5rem; left: 33%; width: 20rem; height: 20rem; background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(167,139,250,.2)); animation-delay: -4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        /* Back button */
        .back-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.75rem;
            background: rgba(255,255,255,.25);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.3);
            border-radius: 0.75rem;
            color: rgba(255,255,255,.8);
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,.35); color: #fff; }
        .back-btn svg { width: 1rem; height: 1rem; flex-shrink: 0; transition: transform 0.2s; }
        .back-btn:hover svg { transform: translateX(-3px); }

        /* Main container */
        .container {
            width: 100%;
            max-width: 22rem;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Glass helpers */
        .glass {
            background: rgba(255,255,255,.25);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.3);
        }
        .glass-dark {
            background: rgba(0,0,0,.10);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.1);
        }

        /* Status banner */
        .status-banner {
            border-radius: 0.75rem;
            padding: 0.625rem 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .pulse-dot {
            width: 0.5rem;
            height: 0.5rem;
            background: #34d399;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 10px rgba(34,197,94,.6); }
            50% { opacity: .8; transform: scale(1.1); box-shadow: 0 0 20px rgba(34,197,94,.8); }
        }
        .status-text { font-size: 0.75rem; color: #fff; font-weight: 500; }
        .status-sub { color: rgba(167,243,208,.9); margin-left: 0.5rem; }

        /* Card */
        .card {
            border-radius: 1rem;
            padding: 1.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
        }

        /* Logo */
        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .logo-outer { position: relative; }
        .logo-icon {
            width: 4rem;
            height: 4rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(118,75,162,.4);
            border: 1px solid rgba(255,255,255,.2);
            position: relative;
            z-index: 1;
        }
        .logo-icon svg { width: 2rem; height: 2rem; stroke: #fff; }
        .logo-glow {
            position: absolute;
            inset: -4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            border-radius: 1.25rem;
            opacity: .3;
            filter: blur(8px);
            animation: pulse-anim 2s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes pulse-anim {
            0%, 100% { opacity: .3; }
            50% { opacity: .5; }
        }

        h2 { text-align: center; font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.375rem; }
        .subtitle { text-align: center; font-size: 0.875rem; color: rgba(255,255,255,.7); margin-bottom: 1.5rem; }
        .gradient-text {
            background: linear-gradient(90deg, #a78bfa, #f9a8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        /* Form */
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.75rem; font-weight: 500; color: rgba(255,255,255,.8); margin-bottom: 0.375rem; }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 0.625rem 0.75rem;
            background: rgba(0,0,0,.20);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 0.75rem;
            font-size: 0.875rem;
            color: #fff;
            outline: none;
            transition: box-shadow 0.2s, transform 0.15s;
        }
        input::placeholder { color: rgba(255,255,255,.4); }
        input:focus {
            box-shadow: 0 0 0 2px rgba(102,126,234,.5), 0 0 20px rgba(102,126,234,.3);
            border-color: rgba(102,126,234,.8);
            transform: scale(1.01);
        }

        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 2.5rem; }
        .toggle-pw {
            position: absolute;
            inset-y: 0;
            right: 0;
            padding: 0 0.75rem;
            display: flex;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,.5);
            transition: color 0.15s;
        }
        .toggle-pw:hover { color: rgba(255,255,255,.8); }
        .toggle-pw svg { width: 1rem; height: 1rem; }

        /* Row */
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1rem 0;
            font-size: 0.75rem;
        }
        .checkbox-label { display: flex; align-items: center; gap: 0.5rem; color: rgba(255,255,255,.7); cursor: pointer; }
        input[type="checkbox"] { width: 0.75rem; height: 0.75rem; accent-color: #8b5cf6; }
        .forgot { color: #c4b5fd; font-weight: 500; text-decoration: none; transition: color 0.15s; }
        .forgot:hover { color: #ddd6fe; }

        /* Submit */
        .btn-submit {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: #fff;
            font-size: 0.875rem;
            font-weight: 600;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
            transition: left 0.5s;
        }
        .btn-submit:hover::before { left: 100%; }
        .btn-submit:hover { box-shadow: 0 8px 30px rgba(118,75,162,.5); }
        .btn-submit:disabled { opacity: .6; cursor: not-allowed; }
        .btn-submit svg { width: 1rem; height: 1rem; }

        /* Spinner */
        .spinner {
            display: none;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Contact */
        .contact-note { text-align: center; margin-top: 1rem; font-size: 0.75rem; color: rgba(255,255,255,.6); }
        .contact-note a { color: #c4b5fd; font-weight: 500; text-decoration: none; }
        .contact-note a:hover { color: #ddd6fe; }

        /* Demo box */
        .demo-box { margin-top: 1.5rem; border-radius: 0.75rem; padding: 1rem; }
        .demo-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
        .demo-header svg { width: 1rem; height: 1rem; stroke: #a78bfa; }
        .demo-header h3 { font-size: 0.75rem; font-weight: 500; color: rgba(255,255,255,.9); }
        .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .demo-btn {
            padding: 0.75rem;
            background: rgba(255,255,255,.25);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.2);
            border-radius: 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
            color: inherit;
        }
        .demo-btn:hover { background: rgba(255,255,255,.35); }
        .demo-btn-title { font-size: 0.75rem; font-weight: 500; color: #fff; margin-bottom: 0.25rem; }
        .demo-btn-email { font-size: 0.625rem; color: rgba(255,255,255,.5); }

        /* Footer */
        .footer { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .footer-status {
            border-radius: 0.5rem;
            padding: 0.375rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,.7);
        }
        .mini-dot { width: 0.375rem; height: 0.375rem; background: #34d399; border-radius: 50%; animation: pulse-anim 2s ease-in-out infinite; }
        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: rgba(196,181,253,.8);
            text-decoration: none;
            transition: color 0.15s;
        }
        .footer-link:hover { color: #ddd6fe; }
        .footer-link svg { width: 0.75rem; height: 0.75rem; transition: transform 0.2s; }
        .footer-link:hover svg { transform: rotate(12deg); }
    </style>
</head>
<body>
    <!-- Floating background blobs -->
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Back button -->
    <a class="back-btn" href="/">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </svg>
        Back to Home
    </a>

    <div class="container">
        <!-- Status banner -->
        <div class="glass status-banner">
            <div class="pulse-dot"></div>
            <div class="status-text">System Online <span class="status-sub">• API Ready</span></div>
        </div>

        <!-- Card -->
        <div class="glass card">
            <!-- Logo -->
            <div class="logo-wrap">
                <div class="logo-outer">
                    <div class="logo-glow"></div>
                    <div class="logo-icon">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M8 17l4 4 4-4m-4-5v9M3 4h18v12H3z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to <span class="gradient-text">ArwaPark</span></p>

            <form id="login-form" onsubmit="handleLogin(event)" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" autocomplete="email"
                           required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrap">
                        <input id="password" name="password" type="password"
                               autocomplete="current-password" required placeholder="Password">
                        <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Toggle password">
                            <svg id="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="row">
                    <label class="checkbox-label">
                        <input id="remember-me" name="remember-me" type="checkbox">
                        Remember
                    </label>
                    <a href="#" class="forgot">Forgot?</a>
                </div>

                <button type="submit" id="login-btn" class="btn-submit">
                    <span id="login-text">Sign In</span>
                    <div id="login-spinner" class="spinner"></div>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" id="arrow-icon">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                    </svg>
                </button>

                <p class="contact-note">
                    Need help? <a href="#">Contact admin</a>
                </p>
            </form>

            <!-- Demo credentials -->
            <div class="demo-box glass-dark">
                <div class="demo-header">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3>Demo Accounts</h3>
                </div>
                <div class="demo-grid">
                    <button type="button" class="demo-btn" onclick="fillDemo('admin')">
                        <div class="demo-btn-title">Admin</div>
                        <div class="demo-btn-email">admin@arwapark.com</div>
                    </button>
                    <button type="button" class="demo-btn" onclick="fillDemo('agency')">
                        <div class="demo-btn-title">Agency</div>
                        <div class="demo-btn-email">agency@example.com</div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="glass footer-status">
                <div class="mini-dot"></div>
                arwapark.digima.cloud
            </div>
            <a href="/api/docs" target="_blank" rel="noopener noreferrer" class="footer-link">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                API Docs
            </a>
        </div>
    </div>

    <script src="/login/login.js"></script>
</body>
</html>
